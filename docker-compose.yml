services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: "blog"
      POSTGRES_USER: "blog_user"
      POSTGRES_PASSWORD: "12345"
      POSTGRES_PORT: "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "port=5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U blog_user -d blog" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
